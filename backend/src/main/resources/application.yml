server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: recipe-detection-api

management:
  endpoints:
    web:
      exposure:
        include: health,info

gitops:
  repo-url: https://github.com/TasteTheThunder/hpe-recipe.git
  local-path: ${java.io.tmpdir}/hpe-recipe-gitops
  branch: main
  username: ${GIT_USERNAME:TasteTheThunder}
  token: ${GIT_TOKEN:}
  values-dir: helm/recipe-detection-chart

jenkins:
  url: ${JENKINS_URL:http://localhost:8080}
  job: ${JENKINS_JOB:hpe-recipe}
  username: ${JENKINS_USER:}
  token: ${JENKINS_TOKEN:}
kubernetes:
  clusters:
    dev:
      context: ${K8S_DEV_CONTEXT:dev}
      namespace: ${K8S_DEV_NAMESPACE:recipe-detection}
    prod:
      context: ${K8S_PROD_CONTEXT:prod}
      namespace: ${K8S_PROD_NAMESPACE:recipe-detection}
    qa:
      context: ${K8S_QA_CONTEXT:qa}
      namespace: ${K8S_QA_NAMESPACE:recipe-detection}
    integration:
      context: ${K8S_INTEGRATION_CONTEXT:integration}
      namespace: ${K8S_INTEGRATION_NAMESPACE:recipe-detection}